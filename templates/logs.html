{% extends 'base.html' %}
{% block content %}
<h2>Access Logs</h2>
<table>
  <thead>
    <tr><th>Time (UTC)</th><th>Entity</th><th>Type</th><th>Outcome</th><th>Details</th></tr>
  </thead>
  <tbody>
  {% for e in entries %}
    <tr>
      <td>{{ e.ts }}</td>
      <td>{{ e.entity }}</td>
      <td>{{ e.entity_type }}</td>
      <td>{{ e.outcome }}</td>
      <td>{{ e.details }}</td>
    </tr>
  {% else %}
    <tr><td colspan="5">No logs</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
